    <style>
        .glass-nav {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
        }

        .light .glass-nav {
            background: rgba(247, 246, 248, 0.85);
            border-color: rgba(0, 0, 0, 0.05);
        }

        .grid-bg {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(123, 29, 205, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(123, 29, 205, 0.05) 1px, transparent 1px);
        }

        .light .grid-bg {
            background-image: linear-gradient(to right, rgba(123, 29, 205, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(123, 29, 205, 0.08) 1px, transparent 1px);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .light ::-webkit-scrollbar-track {
            background: #f7f6f8;
        }

        ::-webkit-scrollbar-thumb {
            background: #312938;
            border-radius: 4px;
        }

        .light ::-webkit-scrollbar-thumb {
            background: #d1d5db;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #7b1dcd;
        }

        /* Smooth transitions for theme switching */
        * {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        @keyframes menu-slide-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-menu-item {
            animation: menu-slide-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
